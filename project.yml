# xcodegen spec — wraps the SwiftPM FlareImApp package into a runnable iOS app target.
# Generate:  xcodegen generate   (after scripts/sync_ffi.sh)
# Build sim: xcodebuild -project FlareImApp.xcodeproj -scheme FlareImApp \
#              -destination 'platform=iOS Simulator,name=iPhone 17' build
#
# FFI: the iOS NativeLibraryLoader resolves the C-ABI via dlopen(nil), so the static
# slice must be (1) force-loaded (kept past dead-strip) and (2) export_dynamic (in the
# dynamic symbol table so dlsym finds it).
name: FlareImApp
options:
  bundleIdPrefix: com.flare.im.example
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true

packages:
  FlareImApp:
    path: .

targets:
  FlareImExampleApp:
    type: application
    platform: iOS
    sources:
      - path: Sources/FlareImAppRunner
    dependencies:
      - package: FlareImApp
        product: FlareImApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.flare.im.example.app
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_KEY_UILaunchScreen_Generation: "YES"
        INFOPLIST_KEY_CFBundleDisplayName: FlareIM
        INFOPLIST_KEY_NSMicrophoneUsageDescription: FlareIM needs microphone access to record and send voice messages.
        ONLY_ACTIVE_ARCH: "YES"
        SWIFT_VERSION: "6.0"
        # Static FFI (arm64 simulator slice). dlopen(nil)+dlsym needs force_load + export_dynamic.
        OTHER_LDFLAGS:
          - -force_load
          - $(PROJECT_DIR)/FFI/ios/aarch64-apple-ios-sim/libflare_im_core_sdk_ffi.a
          - -Xlinker
          - -export_dynamic
